<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitter style navbar</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background-color: rgb(255, 255, 255);
      }
      nav {
        background-color: rgba(144, 238, 144, 0.499);
        position: absolute;
        width: 100px;
        height: 100vh;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        box-sizing: border-box;
      }
     nav ul{
        list-style: none;
        display: flex;
        flex-direction: column;
        gap:20px;
        justify-content: left;
        align-items: left;
        width: 100%;
        margin:0;
        padding:0

       
      }
      nav ul li:hover{
        width: 100%;
        background-color: lightblue;
        padding-bottom: 10px;
        padding-top: 10px;
     
      }


      nav ul li a{
        text-decoration: none;
        color:black;
        cursor:progress;
        position: relative;
      }

      nav ul li a::after{
        content: "";
        bottom:0;
        left: 0;
        position: absolute;
        width: 100%;
        height: 2px;
        background-color: blue;
        transform: scaleX(0);
        transition: transform 0.4s ease-in-out;

      }

      nav ul li a:hover::after{
        transform: scaleX(1);
      }

    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contacts</a></li>
        <li><a href="#">Careers</a></li>
      </ul>
    </nav>
  </body>
</html>
