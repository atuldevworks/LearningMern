<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navbar01</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Edu+VIC+WA+NT+Hand:wght@400..700&display=swap');
        body{
            margin:0;
            padding:0;
            font-family: "Edu VIC WA NT Hand";
            background-color: rgb(255,255,255);
            height: 100vh;
        }

        nav{
           position: absolute;
            background-color: rgb(251, 252, 252);
            width: 100%;
            height: 50px;
        }
        nav ul {
            display: flex;
            justify-content: center;
            align-items: center;
            gap:20px;
        }
        nav ul li {
            list-style: none;
        }
        nav ul li a{
            text-decoration: none;
            color:Black;
            font-weight: bold;
            position: relative;
            width: 100%;
        }

        nav ul li a::after{
            content: "";
            position: absolute;
            bottom:0;
            height:2px;
            left: 0;
            width: 100%;
            background-color: rgb(10, 139, 252);
            transform: scaleX(0);
            transition: transform 0.5s ease-in-out;
            

        }
        nav ul li a:hover::after{
            transform: scaleX(1);
        }

         

    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contacts</a></li>
        </ul>
    </nav>
</body>
</html>
